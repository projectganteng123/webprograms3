<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Scene</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; }

    /* Paksa semua yang AR.js buat agar fullscreen dan visible */
    canvas, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    canvas {
      z-index: 2 !important;
      background: transparent !important;
    }
    video {
      z-index: 1 !important;
    }

    #msg {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff; font-size: 12px;
      padding: 5px 14px; border-radius: 20px;
      font-family: sans-serif;
      z-index: 99; pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="msg">Memulai kamera…</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <a-scene
    id="ar-scene"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.75; maxDetectionRate: 60;"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets timeout="15000"></a-assets>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    function msg(t) {
      const el = document.getElementById('msg');
      if (el) el.textContent = t;
    }

    // Setelah scene siap, coba pindah ke kamera wide jika tersedia
    // Pendekatan: poll sampai video AR.js punya stream, lalu cek label-nya
    // Kalau labelnya mengandung zoom/tele → cari pengganti
    // Kalau sudah wide → biarkan saja, jangan ganggu
    const zoomKw = ['telephoto','tele','zoom','periscope','2x','3x','4x','5x','10x'];
    const wideKw = ['wide','main','back (0)','camera2 0'];

    async function tryPickBetterCamera() {
      // Tunggu video AR.js punya stream aktif
      let arVideo = null;
      for (let i = 0; i < 30; i++) {
        arVideo = document.querySelector('video');
        if (arVideo && arVideo.srcObject) break;
        await sleep(300);
      }
      if (!arVideo || !arVideo.srcObject) return;

      const track = arVideo.srcObject.getVideoTracks()[0];
      const currentLabel = (track?.label || '').toLowerCase();
      console.log('[CAM] Kamera aktif saat ini:', track?.label);

      // Kalau sudah wide/main, tidak perlu ganti
      const isZoom = zoomKw.some(k => currentLabel.includes(k));
      if (!isZoom) {
        msg('📷 Kamera aktif');
        setTimeout(() => { document.getElementById('msg').style.display='none'; }, 2000);
        return;
      }

      // Kamera saat ini adalah zoom — cari yang wide
      msg('Mengganti ke kamera utama…');
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      const nonZoom = cams.filter(c => !zoomKw.some(k => c.label.toLowerCase().includes(k)));
      const best = nonZoom.find(c => wideKw.some(k => c.label.toLowerCase().includes(k))) || nonZoom[0];

      if (!best || best.deviceId === track?.getSettings()?.deviceId) {
        msg('📷 Kamera aktif');
        setTimeout(() => { document.getElementById('msg').style.display='none'; }, 2000);
        return;
      }

      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: best.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });

        // Stop track lama — tapi JANGAN stop srcObject langsung
        // agar pipeline AR.js tidak rusak
        track.stop();

        // Replace track di stream yang sama
        const newTrack = newStream.getVideoTracks()[0];
        arVideo.srcObject.removeTrack(track);
        arVideo.srcObject.addTrack(newTrack);

        console.log('[CAM] Berhasil ganti ke:', newTrack.label);
        msg('📷 ' + newTrack.label.slice(0, 40));
        setTimeout(() => { document.getElementById('msg').style.display='none'; }, 3000);
      } catch(e) {
        console.warn('[CAM] Gagal ganti kamera:', e);
        msg('📷 Kamera aktif');
        setTimeout(() => { document.getElementById('msg').style.display='none'; }, 2000);
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Jalankan setelah scene load
    document.getElementById('ar-scene').addEventListener('loaded', () => {
      msg('Kamera aktif');
      tryPickBetterCamera();
    });

    // ── Marker & model logic ─────────────────────────────────
    const MARKER_DEFS = {
      hiro:    { preset: 'hiro' },
      kanji:   { preset: 'kanji' },
      letterA: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterA.patt' },
      letterB: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterB.patt' },
      letterC: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterC.patt' },
      letterD: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterD.patt' },
    };

    let currentSrc  = null;
    let currentType = 'glb';

    AFRAME.registerComponent('markerhandler', {
      init() {
        this.t = null;
        this.el.addEventListener('markerFound', () => {
          clearTimeout(this.t);
          Array.from(this.el.children).forEach(c => c.object3D.visible = true);
        });
        this.el.addEventListener('markerLost', () => {
          this.t = setTimeout(() => {
            Array.from(this.el.children).forEach(c => c.object3D.visible = false);
          }, 400);
        });
      }
    });

    window.addEventListener('message', (e) => {
      const { type, payload } = e.data || {};
      if (type === 'REBUILD') rebuildMarkers(payload);
    });

    function rebuildMarkers({ markers, controls, modelSrc, modelType }) {
      if (modelSrc) { currentSrc = modelSrc; currentType = modelType || 'glb'; }

      const scene = document.getElementById('ar-scene');
      if (!scene) return;
      scene.querySelectorAll('a-marker').forEach(el => el.remove());
      if (!currentSrc || !markers?.length) return;

      const { scale, height, rotate } = controls;
      markers.forEach(m => {
        const def = MARKER_DEFS[m.type] || MARKER_DEFS.hiro;
        const mk = document.createElement('a-marker');

        if (def.preset === 'hiro' || def.preset === 'kanji') {
          mk.setAttribute('preset', def.preset);
        } else {
          mk.setAttribute('preset', 'custom');
          mk.setAttribute('type', 'pattern');
          mk.setAttribute('url', def.url);
        }
        mk.setAttribute('smooth', 'true');
        mk.setAttribute('smoothCount', '3');
        mk.setAttribute('smoothTolerance', '0.01');
        mk.setAttribute('smoothThreshold', '2');
        mk.setAttribute('minConfidence', '0.4');
        mk.setAttribute('markerhandler', '');

        const ent = document.createElement('a-entity');
        ent.setAttribute('scale', `${scale} ${scale} ${scale}`);
        ent.setAttribute('position', `0 ${height} 0`);
        ent.setAttribute('rotation', `0 ${rotate} 0`);
        ent.setAttribute('raycaster', 'enabled: false');
        if (currentType === 'obj') {
          ent.setAttribute('obj-model', `obj: url(${currentSrc})`);
        } else {
          ent.setAttribute('gltf-model', `url(${currentSrc})`);
        }
        mk.appendChild(ent);
        scene.appendChild(mk);
      });
    }
  </script>
</body>
</html>
