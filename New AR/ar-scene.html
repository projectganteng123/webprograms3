<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Scene</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #msg {
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.65); color:#fff; font-size:12px;
      padding:6px 16px; border-radius:20px; font-family:sans-serif;
      pointer-events:none; z-index:99; white-space:nowrap;
    }
  </style>
</head>
<body>

  <div id="msg">Memulai…</div>

  <script>
    // ── Langkah 1: minta izin → enumerate → pilih kamera wide
    // Langkah 2: inject <script> A-Frame + AR.js dengan sourceDevice yg benar
    // Dengan cara ini AR.js LANGSUNG pakai kamera yang kita pilih sejak awal,
    // tidak perlu switch stream (switch = sumber masalah layar hitam)

    const zoomKw = ['telephoto','tele','zoom','periscope','2x','3x','4x','5x','10x'];
    const wideKw = ['wide','main','back (0)','camera2 0','facing back 0'];

    function msg(t) { document.getElementById('msg').textContent = t; }

    async function pickCamera() {
      // Minta izin dulu agar label terisi
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' }, audio:false });
        tmp.getTracks().forEach(t => t.stop());
      } catch(e) {
        msg('❌ Izin kamera ditolak'); return null;
      }

      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams    = devices.filter(d => d.kind === 'videoinput');
      console.log('[CAM]', cams.map(c => c.label));

      // Buang zoom/telefoto
      const safe = cams.filter(c => !zoomKw.some(k => c.label.toLowerCase().includes(k)));
      // Prioritaskan wide/main
      let best = safe.find(c => wideKw.some(k => c.label.toLowerCase().includes(k)));
      if (!best) best = safe[0] || cams[0];

      console.log('[CAM] pilih:', best?.label);
      return best?.deviceId || null;
    }

    async function boot() {
      msg('Memilih kamera…');
      const deviceId = await pickCamera();
      if (!deviceId) return;

      msg('Memuat AR…');

      // Tentukan constraints yang akan dipakai AR.js
      // AR.js membaca window.ARjsContext?.arController — tidak bisa
      // Cara paling bersih: override navigator.mediaDevices.getUserMedia
      // sehingga saat AR.js memanggil getUserMedia, kita sudah sisipkan deviceId

      const _origGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
      navigator.mediaDevices.getUserMedia = function(constraints) {
        // Kalau AR.js minta video environment, kita ganti dengan deviceId spesifik
        if (constraints && constraints.video) {
          constraints.video = {
            deviceId: { exact: deviceId },
            width:  { ideal: 1280 },
            height: { ideal: 720 },
          };
          console.log('[CAM] getUserMedia intercepted → deviceId', deviceId.slice(0,8));
        }
        return _origGetUserMedia(constraints);
      };

      // Sekarang load A-Frame + AR.js — mereka akan pakai getUserMedia yg sudah dioverride
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js');
      await loadScript('https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js');

      buildScene();
      msg('Arahkan ke marker');
      setTimeout(() => { document.getElementById('msg').style.display='none'; }, 3000);
    }

    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    function buildScene() {
      // Buat a-scene setelah A-Frame siap
      const scene = document.createElement('a-scene');
      scene.setAttribute('id', 'ar-scene');
      scene.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.75; maxDetectionRate: 60;');
      scene.setAttribute('renderer', 'antialias: true; alpha: true; logarithmicDepthBuffer: true;');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

      const assets = document.createElement('a-assets');
      assets.setAttribute('timeout', '15000');
      scene.appendChild(assets);

      const cam = document.createElement('a-entity');
      cam.setAttribute('camera', '');
      scene.appendChild(cam);

      document.body.appendChild(scene);

      // Register komponen markerhandler
      AFRAME.registerComponent('markerhandler', {
        init() {
          this.hideTimeout = null;
          this.el.addEventListener('markerFound', () => {
            if (this.hideTimeout) { clearTimeout(this.hideTimeout); this.hideTimeout = null; }
            Array.from(this.el.children).forEach(c => { c.object3D.visible = true; });
          });
          this.el.addEventListener('markerLost', () => {
            this.hideTimeout = setTimeout(() => {
              Array.from(this.el.children).forEach(c => { c.object3D.visible = false; });
            }, 400);
          });
        }
      });

      // Dengarkan pesan dari halaman induk
      window.addEventListener('message', (e) => {
        const { type, payload } = e.data || {};
        if (type === 'REBUILD') rebuildMarkers(payload);
      });
    }

    // ── State model ─────────────────────────────────────────────
    let modelSrc  = null;
    let modelType = 'glb';

    const MARKER_DEFS = {
      hiro:    { preset: 'hiro' },
      kanji:   { preset: 'kanji' },
      letterA: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterA.patt' },
      letterB: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterB.patt' },
      letterC: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterC.patt' },
      letterD: { preset:'custom', url:'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/data/pattern-files/pattern-letterD.patt' },
    };

    function rebuildMarkers({ markers, controls, modelSrc: src, modelType: type }) {
      if (src) { modelSrc = src; modelType = type || 'glb'; }

      const scene = document.getElementById('ar-scene');
      if (!scene) return;
      scene.querySelectorAll('a-marker').forEach(el => el.remove());
      if (!modelSrc || !markers?.length) return;

      const { scale, height, rotate } = controls;

      markers.forEach(m => {
        const def = MARKER_DEFS[m.type] || MARKER_DEFS.hiro;
        const aMarker = document.createElement('a-marker');

        if (def.preset === 'hiro' || def.preset === 'kanji') {
          aMarker.setAttribute('preset', def.preset);
        } else {
          aMarker.setAttribute('preset', 'custom');
          aMarker.setAttribute('type', 'pattern');
          aMarker.setAttribute('url', def.url);
        }
        aMarker.setAttribute('smooth', 'true');
        aMarker.setAttribute('smoothCount', '3');
        aMarker.setAttribute('smoothTolerance', '0.01');
        aMarker.setAttribute('smoothThreshold', '2');
        aMarker.setAttribute('minConfidence', '0.4');
        aMarker.setAttribute('markerhandler', '');

        const entity = document.createElement('a-entity');
        entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
        entity.setAttribute('position', `0 ${height} 0`);
        entity.setAttribute('rotation', `0 ${rotate} 0`);
        entity.setAttribute('raycaster', 'enabled: false');

        if (modelType === 'obj') {
          entity.setAttribute('obj-model', `obj: url(${modelSrc})`);
        } else {
          entity.setAttribute('gltf-model', `url(${modelSrc})`);
        }

        aMarker.appendChild(entity);
        scene.appendChild(aMarker);
      });
    }

    // Mulai
    boot();
  </script>
</body>
</html>
